<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register – SocialSphere</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <i class="fas fa-infinity"></i>
      <h1>SocialSphere</h1>
      <p>Create your free account today.</p>
    </div>

    <form id="registerForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="name">Full Name</label>
        <div class="input-group">
          <i class="fas fa-user input-icon"></i>
          <input type="text" id="name" name="name" class="form-input" placeholder="Your full name" required autocomplete="name" />
        </div>
        <span class="form-error" id="nameError"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <div class="input-group">
          <i class="fas fa-at input-icon"></i>
          <input type="text" id="username" name="username" class="form-input" placeholder="yourhandle" required autocomplete="username" />
        </div>
        <span class="form-error" id="usernameError"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <div class="input-group">
          <i class="fas fa-envelope input-icon"></i>
          <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <span class="form-error" id="emailError"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-group" style="position:relative;">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" id="password" name="password" class="form-input" placeholder="Min 6 characters" required autocomplete="new-password" />
          <button type="button" class="password-toggle" id="togglePass" aria-label="Toggle password">
            <i class="fas fa-eye"></i>
          </button>
        </div>
        <div class="password-strength" id="strengthWrap" style="display:none;">
          <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
          <span class="strength-text" id="strengthText"></span>
        </div>
        <span class="form-error" id="passwordError"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm Password</label>
        <div class="input-group" style="position:relative;">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" id="confirmPassword" name="confirmPassword" class="form-input" placeholder="Repeat your password" required autocomplete="new-password" />
          <button type="button" class="password-toggle" id="toggleConfirm" aria-label="Toggle password">
            <i class="fas fa-eye"></i>
          </button>
        </div>
        <span class="form-error" id="confirmError"></span>
      </div>

      <div id="formError" style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:10px 14px;font-size:0.875rem;color:#ef4444;margin-bottom:16px;display:none;"></div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" id="registerBtn">
        <span class="btn-text"><i class="fas fa-rocket"></i> Create Account</span>
        <span class="btn-loader" style="display:none;"><i class="fas fa-spinner fa-spin"></i></span>
      </button>
    </form>

    <div class="auth-link">Already have an account? <a href="login.html">Sign in</a></div>

    <div style="display:flex;align-items:center;justify-content:center;margin-top:16px;">
      <button id="themeToggle" style="background:var(--bg-input);border:1px solid var(--border-color);border-radius:9999px;padding:6px 14px;font-size:0.8rem;color:var(--text-muted);display:flex;align-items:center;gap:6px;cursor:pointer;transition:all .2s;">
        <i class="fas fa-moon" id="themeIcon"></i> <span id="themeLabel">Dark Mode</span>
      </button>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="js/utils.js"></script>
  <script>
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    updateThemeBtn(savedTheme);

    function updateThemeBtn(t) {
      const icon = document.getElementById('themeIcon');
      const label = document.getElementById('themeLabel');
      if (icon) icon.className = t === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
      if (label) label.textContent = t === 'dark' ? 'Light Mode' : 'Dark Mode';
    }
    document.getElementById('themeToggle').addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateThemeBtn(next);
    });

    // Password toggle helpers
    function makeToggle(toggleId, inputId) {
      document.getElementById(toggleId).addEventListener('click', function() {
        const input = document.getElementById(inputId);
        const icon = this.querySelector('i');
        if (input.type === 'password') { input.type = 'text'; icon.className = 'fas fa-eye-slash'; }
        else { input.type = 'password'; icon.className = 'fas fa-eye'; }
      });
    }
    makeToggle('togglePass', 'password');
    makeToggle('toggleConfirm', 'confirmPassword');

    // Password strength
    document.getElementById('password').addEventListener('input', function() {
      const val = this.value;
      const wrap = document.getElementById('strengthWrap');
      const fill = document.getElementById('strengthFill');
      const text = document.getElementById('strengthText');
      if (!val) { wrap.style.display = 'none'; return; }
      wrap.style.display = 'block';
      let strength = 0;
      if (val.length >= 6) strength++;
      if (/[A-Z]/.test(val)) strength++;
      if (/[0-9]/.test(val)) strength++;
      if (/[^A-Za-z0-9]/.test(val)) strength++;
      const levels = ['', 'weak', 'medium', 'strong', 'strong'];
      const labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
      const colors = ['', '#ef4444', '#f59e0b', '#22c55e', '#22c55e'];
      fill.style.width = `${strength * 25}%`;
      fill.style.background = colors[strength];
      text.textContent = labels[strength] ? `Password strength: ${labels[strength]}` : '';
    });

    // Username validation helper
    document.getElementById('username').addEventListener('input', function() {
      this.value = this.value.toLowerCase().replace(/[^a-z0-9_]/g, '');
    });

    // Form submit
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      clearErrors();

      const name = document.getElementById('name').value.trim();
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;
      let valid = true;

      if (!name || name.length < 2) { showFieldError('nameError', 'Name must be at least 2 characters'); document.getElementById('name').classList.add('error'); valid = false; }
      if (!username || username.length < 3) { showFieldError('usernameError', 'Username must be at least 3 characters'); document.getElementById('username').classList.add('error'); valid = false; }
      if (!/^[a-z0-9_]+$/.test(username)) { showFieldError('usernameError', 'Username can only contain letters, numbers, and underscores'); document.getElementById('username').classList.add('error'); valid = false; }
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showFieldError('emailError', 'Please enter a valid email address'); document.getElementById('email').classList.add('error'); valid = false; }
      if (!password || password.length < 6) { showFieldError('passwordError', 'Password must be at least 6 characters'); document.getElementById('password').classList.add('error'); valid = false; }
      if (password !== confirm) { showFieldError('confirmError', 'Passwords do not match'); document.getElementById('confirmPassword').classList.add('error'); valid = false; }
      if (!valid) return;

      setLoading(true);
      try {
        const res = await fetch(API_BASE + '/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ name, username, email, password })
        });
        const data = await res.json();
        if (data.success) {
          showToast('Account created! Redirecting...', 'success');
          setTimeout(() => window.location.href = API_BASE + '/feed.html', 1200);
        } else {
          if (data.errors) {
            data.errors.forEach(err => {
              const fieldMap = { name: 'nameError', username: 'usernameError', email: 'emailError', password: 'passwordError' };
              if (fieldMap[err.path]) showFieldError(fieldMap[err.path], err.msg);
            });
          } else {
            showFormError(data.message || 'Registration failed');
          }
        }
      } catch (err) {
        showFormError('Network error. Please check your connection.');
      } finally {
        setLoading(false);
      }
    });

    function clearErrors() {
      document.querySelectorAll('.form-error').forEach(el => { el.textContent = ''; el.classList.remove('show'); });
      document.querySelectorAll('.form-input').forEach(el => el.classList.remove('error'));
      document.getElementById('formError').style.display = 'none';
    }
    function showFieldError(id, msg) { const el = document.getElementById(id); el.textContent = msg; el.classList.add('show'); }
    function showFormError(msg) { const el = document.getElementById('formError'); el.textContent = msg; el.style.display = 'block'; }
    function setLoading(loading) {
      const btn = document.getElementById('registerBtn');
      btn.querySelector('.btn-text').style.display = loading ? 'none' : 'inline-flex';
      btn.querySelector('.btn-loader').style.display = loading ? 'inline' : 'none';
      btn.disabled = loading;
    }

    // Redirect if logged in — API_BASE from utils.js
    fetch(API_BASE + '/api/me', { credentials: 'include' })
      .then(r => r.json())
      .then(d => { if (d.success) window.location.href = API_BASE + '/feed.html'; })
      .catch(() => {});
  </script>
</body>
</html>
