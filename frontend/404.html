<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 – Page Not Found – SocialSphere</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-primary); text-align: center; padding: 40px 20px; }
    .error-code { font-size: 8rem; font-weight: 900; line-height: 1; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px; }
    .error-page h2 { font-size: 2rem; margin-bottom: 12px; }
    .error-page p { color: var(--text-muted); font-size: 1rem; margin-bottom: 28px; max-width: 400px; }
    .error-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-code">404</div>
    <h2>Oops! Page Not Found</h2>
    <p>The page you're looking for doesn't exist or may have been moved. Let's get you back on track.</p>
    <div class="error-actions">
      <a href="/feed.html" class="btn btn-primary btn-lg"><i class="fas fa-home"></i> Go to Feed</a>
      <a href="javascript:history.back()" class="btn btn-secondary btn-lg"><i class="fas fa-arrow-left"></i> Go Back</a>
    </div>
  </div>
  <script>
    const saved = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
  </script>
</body>
</html>
